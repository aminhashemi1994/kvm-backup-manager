# Complete Nginx Configuration for KVM Backup Manager

# HTTP -> HTTPS Redirect
server {
    listen 80;
    server_name your-domain-example.com;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain-example.com;
    
    # SSL Configuration
    ssl_certificate     /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/privateKey.pem;
    
    # SSL Security Settings (optional but recommended)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Frontend Build Files
    root /var/www/html/backup-manager-panel/dist;
    index index.html;
    
    client_max_body_size 100M;
    
    # Logs
    access_log /var/log/nginx/backup-access.log;
    error_log  /var/log/nginx/backup-error.log;
    
    # Frontend (React/Vite SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Backend API - Used by BOTH browser and agent
    location /api-backup/ {
        rewrite ^/api-backup/(.*) /api/$1 break;
        proxy_pass https://192.168.52.80:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSL verification - disable if using self-signed certificates
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Important: Don't buffer for SSE (Server-Sent Events) and streaming logs
        proxy_buffering off;
    }
    
    # Socket.IO WebSocket - CRITICAL for real-time updates!
    location /socket.io/ {
        proxy_pass http://172.16.0.101:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support - REQUIRED
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Buffering must be off for WebSocket
        proxy_buffering off;
    }
}