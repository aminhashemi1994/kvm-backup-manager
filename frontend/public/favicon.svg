<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Database stack representing backup storage -->
  <!-- Top database -->
  <ellipse cx="50" cy="30" rx="28" ry="9" fill="#ffffff"/>
  <rect x="22" y="30" width="56" height="10" fill="#ffffff"/>
  <ellipse cx="50" cy="40" rx="28" ry="9" fill="#ffffff"/>
  
  <!-- Middle database -->
  <ellipse cx="50" cy="45" rx="28" ry="9" fill="#e0e7ff"/>
  <rect x="22" y="45" width="56" height="10" fill="#e0e7ff"/>
  <ellipse cx="50" cy="55" rx="28" ry="9" fill="#e0e7ff"/>
  
  <!-- Success checkmark badge -->
  <circle cx="70" cy="70" r="16" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <path d="M 62 70 L 67 75 L 78 64" 
        stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
